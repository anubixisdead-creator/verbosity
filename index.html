const WORD_COUNT = 12;

let current=[];
let locked=new Set();
let history=[];
let seenWords=new Set();

function randomWord(pool){
 return pool[Math.floor(Math.random()*pool.length)];
}

function generate(initial=false){
 const excluded = new Set(history.flat());
 if(initial){
   current=[];
   while(current.length<WORD_COUNT){
      const w=randomWord(WORDS);
      if(!current.includes(w)) current.push(w);
   }
 } else {
   for(let i=0;i<WORD_COUNT;i++) {
      if(!locked.has(i)){
        const used = new Set(current.filter(Boolean));
        let pool = WORDS.filter(w => !excluded.has(w) && !used.has(w));
        if(pool.length===0) pool = WORDS.filter(w => !used.has(w));
        current[i] = randomWord(pool);
      }
   }
 }
 current.forEach(w=>seenWords.add(w));
 history.push([...current]);
 if(history.length>5) history.shift();
 updateUsage();
 render();
}


function updateUsage(){
 const usage=document.getElementById('usage');
 if(usage){
   usage.textContent=`${seenWords.size} of ${WORDS.length} words seen`;
 }
}

function render(){
 const wrap=document.getElementById('words');
 wrap.innerHTML='';
 current.forEach((w,i)=>{
   const el=document.createElement('div');
   el.className='word'+(locked.has(i)?' locked':'');
   el.textContent=w + (locked.has(i)?' 🔒':'');
   el.onclick=()=>{
      locked.has(i)?locked.delete(i):locked.add(i);
      render();
   };
   wrap.appendChild(el);
 });
}

generate(true);

document.getElementById('inspire').onclick=()=>generate();

document.getElementById('copy').onclick=async()=>{
 try {
   await navigator.clipboard.writeText(document.getElementById('editor').value);
   status.textContent='Copied!';
 } catch(e) {
   status.textContent='Copy failed';
 }
 setTimeout(()=>status.textContent='',2000);
};
